<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="1200" height="300" fill="#1b1714"/>

  <!-- single kicker -->
  <text x="70" y="84" font-size="13" font-weight="600" letter-spacing="3.5" fill="#d2963f">AN OPEN-SOURCE PMO TOOLKIT</text>

  <!-- wordmark -->
  <text x="68" y="160" font-size="62" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#f5f1e8">ITPMO</tspan><tspan fill="#d2963f" font-weight="700">-in-a-Box</tspan>
  </text>

  <!-- tagline -->
  <text x="70" y="200" font-size="19" fill="#b9ad9c">Build a Project Management Office from scratch: assessment to operation.</text>

  <!-- accent rule -->
  <rect x="71" y="220" width="190" height="3" rx="1.5" fill="#c8842a"/>

  <!-- 6-stage progress strip -->
  <g>
    <rect x="71"  y="248" width="34" height="7" rx="3.5" fill="#e6b877"/>
    <rect x="113" y="248" width="34" height="7" rx="3.5" fill="#dca85a"/>
    <rect x="155" y="248" width="34" height="7" rx="3.5" fill="#d2963f"/>
    <rect x="197" y="248" width="34" height="7" rx="3.5" fill="#c8842a"/>
    <rect x="239" y="248" width="34" height="7" rx="3.5" fill="#bd7420"/>
    <rect x="281" y="248" width="34" height="7" rx="3.5" fill="#a8631a"/>
    <text x="71" y="278" font-size="12" letter-spacing="1" fill="#8a7e6f">SIX STAGES, ONE PATH</text>
  </g>

  <!-- isometric "kit in a box" mark -->
  <g stroke="#d2963f" stroke-width="2" stroke-linejoin="round">
    <polygon points="1010,104 1082,140 1010,176 938,140" fill="#d2963f" fill-opacity="0.22"/>
    <polygon points="938,140 1010,176 1010,248 938,212" fill="#f5f1e8" fill-opacity="0.05"/>
    <polygon points="1010,176 1082,140 1082,212 1010,248" fill="#000000" fill-opacity="0.18"/>
    <!-- packed layers hint -->
    <line x1="956" y1="168" x2="1010" y2="195" stroke-opacity="0.5"/>
    <line x1="956" y1="186" x2="1010" y2="213" stroke-opacity="0.35"/>
    <line x1="1064" y1="168" x2="1010" y2="195" stroke-opacity="0.5"/>
    <line x1="1064" y1="186" x2="1010" y2="213" stroke-opacity="0.35"/>
  </g>
</svg>
